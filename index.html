<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Periodik</title>
    <!-- Ikon di title tab (Favicon) -->
    <link rel="icon" type="image/svg+xml" href="images/explosion_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.svg">
    <!-- 
    ANALOGI: Tag <link> ini seperti 'kurir' yang mengambil barang dari tempat lain. 
    Di sini kita menugaskan kurir untuk mengambil jenis tulisan (font) 'Roboto' dan 
    ikon-ikon (Material Symbols) dari server Google untuk dibawa ke website kita.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 
    ANALOGI: <header> adalah 'papan nama toko' yang selalu melayang (floating) 
    di bagian paling atas layar supaya pengunjung selalu tahu di mana mereka berada.
    -->
    <header class="floating-header">
        <div class="logo-area">
            <img src="images/explosion_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.svg" alt="Ikon Tabel Periodik" class="header-icon" width="36" height="36">
            <h1>Tabel Periodik</h1>
        </div>

        <!-- Tombol untuk ganti tema Gelap/Terang -->
        <button class="theme-btn" id="theme-toggle" aria-label="Ganti Tema" data-tooltip="Ganti Tema">
            <img src="images/light_mode_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.svg" alt="Ganti Tema" class="theme-icon" id="theme-icon" width="36" height="36">
        </button>
    </header>

    <!-- 
    ANALOGI: <main> adalah 'ruang pameran' utama tempat kita meletakkan barang-barang
    yang ingin ditunjukkan. Di sini kita meletakkan kartu unsur kimia.
    -->
    <main class="main-content" id="elements-container">
        <!-- Kartu-kartu elemen akan di-generate oleh JavaScript secara dinamis di sini -->
    </main>

    <!-- Footer yang mengapung di bagian bawah -->
    <footer class="floating-footer" id="main-footer">
    </footer>

    <!-- 
    ANALOGI: <script> adalah 'sistem listrik' dari rumah kita. 
    Tanpa ini, lampu (tema terang/gelap) tidak bisa dinyalakan, dan pintu (modal) tidak bisa dibuka,
    meskipun kabel dan saklarnya sudah terpasang.
    -->
    <script src="script.js"></script>
</body>

</html>
