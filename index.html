<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabel Periodik</title>
    <link rel="icon" href="images/explosion.svg" type="image/svg+xml" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="floating-header">
      <div class="select-menu">
        <div class="select-btn">
          <span class="sBtn-text">Atom</span>
          <img src="images/arrow_down.svg"></img>
        </div>
        
        <ul class="options">
          <li class="option"><img src="images/explosion.svg"></img>
          <span class="option-text">Atom</span>
        </li>
          <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Aktinida</span>
        </li>
        <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Gas Mulia</span>
        </li>
        <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Lantanida</span>
        </li>
        <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Logam Alkali</span>
        </li>
        <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Logam Alkali Tanah</span>
        </li>
        <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Logam Pasca Transisi</span>
        </li>
        <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Logam Transisi</span>
        </li>
        <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Metaloid</span>
        </li>
        <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Non-Logam Reaktif</span>
        </li>
        <li class="option"><img src="images/communities.svg"></img>
          <span class="option-text">Sifat Kimia Tidak Diketahui</span>
        </li>
        </ul>
      </div>

      <div id="theme-switch">
        <img src="images/dark_mode.svg"></img>
        <img src="images/light_mode.svg"></img>
      </div>
    </header>

    <main class="main-content" id="elements-container"></main>

    <script src="script.js"></script>
  </body>
</html>
